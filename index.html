<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Landing Page -->
    <div id="landing-page" class="page active">
        <div class="map-background"></div>
        <div class="container">
            <div class="search-bar-wrapper">
                <div class="search-bar">
                    <input
                        type="text"
                        id="address-input"
                        placeholder="Enter an address..."
                        class="address-input"
                    >
                    <button class="search-btn" id="search-btn">&#x2192;</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Results Page -->
    <div id="results-page" class="page">
        <div class="container results-container">
            <div class="results-header">
                <button id="back-button" class="back-button">← New Search</button>
                <h2>Real Estate Data</h2>
                <div class="address-display">
                    <strong>Address:</strong> <span id="result-address"></span>
                </div>
            </div>

            <div id="results-content" class="results-content">
                <!-- Claude's response will be displayed here -->
            </div>

            <div class="loading-container" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing real estate data...</p>
            </div>

            <div class="error-container" id="error" style="display: none;">
                <p id="error-message"></p>
                <button id="error-retry" class="back-button">Try Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
